name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-discussion-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discussion-agent
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv run --extra lint ruff check .
      - run: uv run --extra lint ty check
      - run: uv run --extra lint codespell

  lint-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv run ruff check .

  test-discussion-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discussion-agent
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # Excludes the two tests that make a real Gemini/Vertex call
      # (@pytest.mark.live_model) and tests/integration/test_server_e2e.py
      # (@pytest.mark.requires_gcp_credentials -- app.fast_api_app needs real
      # ADC just to start, independent of any generative call) -- no
      # credentials needed here.
      - run: uv run pytest tests/unit tests/integration tests/bdd -m "not live_model and not requires_gcp_credentials"

  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # Hermetic subset (in-memory store/blob fakes); the Firestore-emulator
      # integration tests are intentionally not run in this job.
      - run: uv run pytest tests/unit tests/api tests/bdd

  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install pre-commit semgrep
      - run: pre-commit run --all-files

  # Scans each project's locked dependencies for known vulnerabilities via
  # the public PyPA advisory DB. Runs against the already-resolved uv.lock
  # export with --no-deps --disable-pip so it never installs or imports any
  # audited package -- a security scanner shouldn't itself require running
  # arbitrary third-party install-time code. No credentials needed, so this
  # runs on fork PRs too.
  dependency-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [discussion-agent, backend]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv export --no-hashes --frozen --no-emit-project -o requirements-audit.txt
      - run: uvx pip-audit -r requirements-audit.txt --no-deps --disable-pip

  # Blocks merges below a minimum mean eval score. Authenticates to Vertex AI
  # via Workload Identity Federation (no static secret) -- AI Studio's free
  # tier grants zero quota for gemini-2.5-pro, so a GEMINI_API_KEY alone
  # can't run this job. The WIF provider's attribute-condition restricts
  # token exchange to this exact repo (see
  # docs/repo_configuration_progress.md for the full resource inventory).
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discussion-agent
    permissions:
      contents: read
      id-token: write
    env:
      GOOGLE_GENAI_USE_ENTERPRISE: "true"
      GOOGLE_CLOUD_PROJECT: project-ae1db75b-5a71-4ec5-86f
      GOOGLE_CLOUD_LOCATION: global
    steps:
      - uses: actions/checkout@v7
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/376219115185/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
          service_account: github-ci-eval@project-ae1db75b-5a71-4ec5-86f.iam.gserviceaccount.com
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync --extra eval
      - run: uv tool install google-agents-cli
      - run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: make eval-gate

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # oxlint plus a script asserting zero dangerouslySetInnerHTML usage in
      # src/ (XSS defense-in-depth from Frontend Phase 1's plan).
      - run: npm run lint

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Vitest unit/component suite: jsdom + MSW mocks, hermetic, no backend
      # needed. Playwright e2e specs are excluded by vite.config.ts already.
      - run: npm run test

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # `tsc -b && vite build` -- this is the authoritative TypeScript
      # typecheck gate (deliberately not duplicated in lint-frontend) and
      # also proves the production bundle actually compiles.
      - run: npm run build

  # Needs both a real backend/ process (in-memory store/blob fakes, no GCP
  # credentials) and Playwright's own webServer-managed frontend dev server.
  e2e-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      # Cache Playwright's browser download (lives outside node_modules).
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      # --with-deps still needed even on a cache hit, for OS-level libs;
      # chromium only, matching playwright.config.ts's single project.
      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      # RATE_LIMIT_MAX_REQUESTS raised from the default 10/60s: the whole
      # e2e suite runs serially from one IP, and 10 is low enough that
      # unrelated tests' cumulative workspace creations spuriously trip the
      # same 429 that zzz-rate-limit.spec.ts deliberately exercises (which
      # loops up to 50 requests, so it still reliably hits this ceiling).
      # Raised again to 50 for Phase 2 (frontend discussions UI): the new
      # discussions/ specs add several serial workspace/discussion POSTs
      # within the same window; 50 was verified locally against the full
      # suite (14 specs, all passing, zzz-rate-limit.spec.ts still reliably
      # tripping the 429 within its own 50-request loop).
      - name: Start backend
        working-directory: backend
        env:
          RATE_LIMIT_MAX_REQUESTS: "50"
          DISCUSSION_AGENT_FAKE: "1"
          DISCUSSION_AGENT_FAKE_DELAY_MS: "100"
          LLM_FAKE: "1"
        run: uv run uvicorn app.main:app --port 8000 &
      # Poll for readiness instead of a blind sleep; no dedicated health
      # endpoint exists yet, so /openapi.json is the readiness signal.
      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8000/openapi.json >/dev/null && exit 0
            sleep 1
          done
          echo "backend did not become ready" >&2; exit 1
      - name: Run e2e
        working-directory: frontend
        env:
          # Makes Playwright skip reuseExistingServer and enables its
          # retries=2 setting (see playwright.config.ts).
          CI: "true"
        run: npx playwright test
