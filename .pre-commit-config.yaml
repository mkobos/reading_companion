repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      - id: semgrep
        name: semgrep
        entry: semgrep --error --config .semgrep/rules.yaml .
        language: system
        pass_filenames: false
